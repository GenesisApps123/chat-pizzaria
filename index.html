<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Chat Pizza</title>

<style>
body{
  font-family:Arial;
  background:#f4f4f4;
  margin:0;
}

/* TOPO */
.topo{
  display:flex;
  align-items:center;
  gap:10px;
  background:#d32f2f;
  color:white;
  padding:10px;
}

.logo{
  width:40px;
  height:40px;
  border-radius:50%;
}

.nome{ font-weight:bold; }
.status{ font-size:12px; opacity:0.8; }

/* CHAT */
#mensagens{
  padding:10px;
  margin-bottom:120px;
}

.msg{
  background:white;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  max-width:80%;
}

.user{
  background:#d1e7ff;
  margin-left:auto;
}

.bot{
  background:#e1ffc7;
}

/* INPUT */
.inputArea{
  position:fixed;
  bottom:60px;
  width:100%;
  display:flex;
}

input{
  flex:1;
  padding:10px;
  border:none;
}

button{
  padding:10px;
  border:none;
  background:#d32f2f;
  color:white;
}

/* CARRINHO */
.carrinho{
  position:fixed;
  bottom:0;
  width:100%;
  background:#fff;
  border-top:2px solid #ccc;
  padding:10px;
  font-size:14px;
}
</style>

</head>
<body>

<!-- TOPO -->
<div class="topo">
  <img src="logo.png" class="logo">
  <div>
    <div class="nome">QueroPizza 🍕</div>
    <div class="status" id="status">🟢 Online</div>
  </div>
</div>

<!-- CHAT -->
<div id="mensagens"></div>

<!-- INPUT -->
<div class="inputArea">
  <input id="input" placeholder="Digite aqui...">
  <button onclick="enviar()">Enviar</button>
</div>

<!-- CARRINHO -->
<div class="carrinho" id="carrinho"></div>

<script>

let etapa = 0;

/* 🔥 NOVO: OBJETO DO PEDIDO */
let pedido = {
  nome: "",
  pizzas: [],
  bebida: "",
  total: 0
};

/* MENSAGEM */
function addMsg(texto, classe="bot"){
  let div = document.createElement("div");
  div.className = "msg " + classe;
  div.innerHTML = texto;
  document.getElementById("mensagens").appendChild(div);
  scroll();
}

function scroll(){
  window.scrollTo(0,document.body.scrollHeight);
}

/* 🔥 NOVO: STATUS DIGITANDO */
function botDigitando(callback){
  let status = document.getElementById("status");
  status.innerHTML = "⌨️ Digitando...";

  setTimeout(()=>{
    status.innerHTML = "🟢 Online";
    callback();
  },1500);
}

/* 🔥 NOVO: ATUALIZA CARRINHO */
function atualizarCarrinho(){

let html = "<b>🧾 Seu pedido:</b><br>";

pedido.pizzas.forEach((p,i)=>{
  html += `🍕 Pizza ${i+1}: ${p}<br>`;
});

if(pedido.bebida){
  html += `🥤 ${pedido.bebida}<br>`;
}

html += `<br><b>Total: R$ ${pedido.total}</b>`;

document.getElementById("carrinho").innerHTML = html;
}

/* ENVIAR */
function enviar(){

let input = document.getElementById("input");
let texto = input.value;

if(!texto) return;

addMsg(texto,"user");
input.value = "";

/* FLUXO ORIGINAL + ADAPTAÇÃO */

if(etapa == 0){
  pedido.nome = texto;

  botDigitando(()=>{
    addMsg("Quantas pizzas você quer?");
  });

  etapa = 1;
}

/* QUANTIDADE */
else if(etapa == 1){

  let qtd = parseInt(texto);

  if(isNaN(qtd) || qtd <= 0){
    addMsg("Digite um número válido.");
    return;
  }

  pedido.qtd = qtd;
  pedido.contador = 1;

  botDigitando(()=>{
    addMsg("Escolha o sabor da pizza 1");
  });

  etapa = 2;
}

/* SABORES */
else if(etapa == 2){

  pedido.pizzas.push(texto);
  pedido.total += 30;

  atualizarCarrinho();

  if(pedido.contador < pedido.qtd){
    pedido.contador++;

    botDigitando(()=>{
      addMsg("Escolha o sabor da pizza " + pedido.contador);
    });

  } else {

    botDigitando(()=>{
      addMsg("Deseja bebida? (Digite o nome ou 'não')");
    });

    etapa = 3;
  }
}

/* BEBIDA */
else if(etapa == 3){

  if(texto.toLowerCase() != "não"){
    pedido.bebida = texto;
    pedido.total += 8;
  }

  atualizarCarrinho();

  botDigitando(()=>{
    addMsg(`
    <b>Confirma seu pedido?</b><br><br>
    Nome: ${pedido.nome}<br>
    Total: R$ ${pedido.total}<br><br>
    Digite "sim" para finalizar
    `);
  });

  etapa = 4;
}

/* FINAL */
else if(etapa == 4){

  if(texto.toLowerCase() == "sim"){

    let msg = `Olá, quero pedir:%0A
Nome: ${pedido.nome}%0A`;

    pedido.pizzas.forEach((p,i)=>{
      msg += `Pizza ${i+1}: ${p}%0A`;
    });

    if(pedido.bebida){
      msg += `Bebida: ${pedido.bebida}%0A`;
    }

    msg += `Total: R$ ${pedido.total}`;

    window.open(`https://wa.me/5588999999999?text=${msg}`);

  } else {
    addMsg("Pedido cancelado.");
  }
}

}

/* INÍCIO */
window.onload = function(){

  botDigitando(()=>{
    addMsg("Olá! 👋 Bem-vindo à QueroPizza 🍕<br><br>Qual seu nome?");
  });

}

</script>

</body>
</html>
